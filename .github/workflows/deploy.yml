name: Deploy to mdx-docker

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 163.220.177.117 >> ~/.ssh/known_hosts 2>/dev/null
          cat >> ~/.ssh/config << 'EOF'
          Host mdx-docker
            HostName 163.220.177.117
            User mdxuser
            IdentityFile ~/.ssh/id_rsa
          EOF

      - name: Rsync to remote server
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.env.local' \
            --exclude='data' \
            ./ mdx-docker:/home/mdxuser/toyo-tunnel/morrison-web/

      - name: Build and deploy
        run: |
          ssh mdx-docker << 'ENDSSH'
            cd /home/mdxuser/toyo-tunnel/morrison-web
            docker build -t morrison-web .
            cd /home/mdxuser/toyo-tunnel
            docker compose up -d toyo-app
          ENDSSH
